version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: placement_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: placement_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  celery:
    build: .
    container_name: placement_celery
    command: celery -A PlacementReady worker -l info 
    volumes:
      - .:/app/backend
    env_file:
      - .env
    depends_on:
      - redis